{% load entity_display %}
<div>
    {% if entity %}
        {% if entity.get_absolute_url %}
            <a href="{{ entity.get_absolute_url }}" target="_BLANK">{% entity_display_name entity %}</a>
        {% else %}
            {% entity_display_name entity %}
        {% endif %}
    {% else %}
        &mdash;
    {% endif %}
</div>
